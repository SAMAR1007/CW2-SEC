version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: homecomf-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: homecomf
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-builder
    container_name: homecomf-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - Nivaas_Backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/homecomf
      - FRONTEND_BASE_URL=http://frontend:3000
      - BACKEND_BASE_URL=http://backend:5000
    volumes:
      - uploads_data:/app/backend/uploads
    command: >
      sh -c "cd /app/backend && npm run dev"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-builder
    container_name: homecomf-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - homecomf_Web/.env.local
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:5000
    command: >
      sh -c "cd /app/frontend && npm run dev"

  mongo-express:
    image: mongo-express:latest
    container_name: homecomf-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    profiles:
      - devtools

volumes:
  mongodb_data:
  uploads_data:
